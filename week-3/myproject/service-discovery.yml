apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-discovery
  namespace: banking-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-discovery
  template:
    metadata:
      labels:
        app: service-discovery
    spec:
      containers:
        - name: service-discovery
          image: yaswanthreddy1602/service-discovery:v1
          ports:
            - containerPort: 3009
          envFrom:
            - configMapRef:
                name: service-discovery-config
 
---
apiVersion: v1
kind: Service
metadata:
  name: service-discovery-service
  namespace: banking-app
spec:
  selector:
    app: service-discovery
  ports:
    - port: 3009
      targetPort: 3009
  type: ClusterIP
 
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-discovery-config
  namespace: banking-app
data:
  PORT: "3009"
