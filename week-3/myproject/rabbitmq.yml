apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: banking-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq-app
  template:
    metadata:
      labels:
        app: rabbitmq-app
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management-alpine

        ports:
        - containerPort: 5672   # AMQP
        - containerPort: 15672  # UI

        volumeMounts:
        - name: rabbitmq-data
          mountPath: /rabbit

      volumes:
      - name: rabbitmq-data
        persistentVolumeClaim:
          claimName: mypvc

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: banking-app
spec:
  type: ClusterIP
  selector:
    app: rabbitmq-app
  ports:
  - name: amqp
    port: 5672
    targetPort: 5672

  - name: management
    port: 15672
    targetPort: 15672
